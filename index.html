<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

    text-decoration:none;
    border-radius:8px;
    margin-top:10px;
    font-weight:bold;
}

.button:hover{
    opacity:0.9;
}

.sizes{
    margin-top:10px;
    color:#ccc;
